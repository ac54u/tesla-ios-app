name: Build TrollStore IPA

# 触发条件：当你推送代码到 main 分支，或者在网页端手动点击运行
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest # 使用 GitHub 免费提供的最新 Mac 虚拟机
    
    steps:
      - name: 📥 获取最新代码
        uses: actions/checkout@v4

      - name: ⚙️ 配置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 📦 安装项目依赖
        run: npm install

      - name: 🏗️ 生成 iOS 原生工程
        run: npx expo prebuild --platform ios --clean

      - name: 🔨 编译无签名 iOS 核心程序 (耗时较长，请耐心等待)
        run: |
          cd ios
          # 精确指定你的主工程名称，Expo 默认是你的项目名（去除了特殊字符）
          # 根据你的项目名 'tesla-ios-app'，默认的 scheme 应该是 'teslaiosapp'
          # 为了保险，我们通过 xcodebuild 自动列出所有 scheme 并取含有 app/app 名的那个
          
          WORKSPACE=$(ls | grep .xcworkspace | head -1)
          
          # 过滤掉 Pods 和 Expo 相关组件，抓取最真实的 App Scheme
          SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list | grep -v 'Pods' | grep -v 'EX' | grep -v 'Expo' | grep -v 'React' | awk 'NR>1 {print $1; exit}')
          
          echo "==== 正在编译 ===="
          echo "Workspace: $WORKSPACE"
          echo "Scheme: $SCHEME"
          echo "================="
          
          # 强制关闭苹果的签名校验进行裸编译
          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
            
          # 按照苹果 IPA 的标准结构打包 Payload
          mkdir -p Payload
          # 从固定的 App.xcarchive 提取 .app 文件
          cp -r $PWD/build/App.xcarchive/Products/Applications/*.app Payload/
          zip -qr ../TrollStore_Tesla.ipa Payload