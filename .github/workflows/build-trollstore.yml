name: Build TrollStore IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: 📥 获取最新代码
        uses: actions/checkout@v4

      - name: ⚙️ 配置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 📦 安装项目依赖
        run: npm install

      - name: 🏗️ 生成 iOS 原生工程
        run: npx expo prebuild --platform ios --clean

      - name: 🍏 强制安装 CocoaPods 依赖
        run: |
          cd ios
          pod install

      - name: 🔨 编译无签名 iOS 核心程序 (暴力破解 Xcode 15 签名限制)
        run: |
          cd ios
          
          # 【终极方案】直接提取 Workspace 的文件名作为 Scheme，100% 准确
          WORKSPACE=$(ls | grep .xcworkspace | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          
          echo "==== 开始精准编译 ===="
          echo "Workspace: $WORKSPACE"
          echo "Scheme: $SCHEME"
          echo "======================"
          
          # 加入所有能关闭签名和权限校验的 Xcode 参数
          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ENTITLEMENTS_REQUIRED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO
            
          # 提取并生成巨魔 IPA
          mkdir -p Payload
          cp -r $PWD/build/App.xcarchive/Products/Applications/*.app Payload/
          zip -qr ../TrollStore_Tesla.ipa Payload

      - name: 📤 上传打包好的 IPA 文件
        uses: actions/upload-artifact@v4
        with:
          name: TrollStore_Tesla_App
          path: TrollStore_Tesla.ipa
          retention-days: 7