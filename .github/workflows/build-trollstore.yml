name: Build TrollStore IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: 📥 获取最新代码
        uses: actions/checkout@v4

      - name: ⚙️ 配置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 🔗 修复 Xcode 找不到 Node 的问题 (解决 Exit Code 65 的核心)
        run: |
          # 强行把 node 链接到系统标准路径，防止 Xcode 脚本报 command not found
          sudo ln -s $(which node) /usr/local/bin/node || true

      - name: 📦 安装项目依赖
        run: npm install

      - name: 🏗️ 生成 iOS 原生工程
        run: npx expo prebuild --platform ios --clean

      - name: 🍏 安装 CocoaPods 依赖
        run: |
          cd ios
          pod install

      - name: 🔨 编译无签名 iOS 核心程序
        run: |
          cd ios
          
          WORKSPACE=$(ls | grep .xcworkspace | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          
          echo "==== 开始精准编译 ===="
          echo "Workspace: $WORKSPACE"
          echo "Scheme: $SCHEME"
          echo "======================"
          
          # 增加 -destination 参数明确指定为 iOS 设备，防止 Xcode 15 迷失方向
          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath $PWD/build/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ENTITLEMENTS_REQUIRED=NO
            
          mkdir -p Payload
          cp -r $PWD/build/App.xcarchive/Products/Applications/*.app Payload/
          zip -qr ../TrollStore_Tesla.ipa Payload

      - name: 📤 上传打包好的 IPA 文件
        uses: actions/upload-artifact@v4
        with:
          name: TrollStore_Tesla_App
          path: TrollStore_Tesla.ipa
          retention-days: 7