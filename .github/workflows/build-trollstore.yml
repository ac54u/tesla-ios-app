name: Build TrollStore IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: 📥 获取最新代码
        uses: actions/checkout@v4

      - name: ⚙️ 配置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 20 # 必须升级到 20+ 才能支持 toReversed 方法
          cache: 'npm'

      - name: 📦 安装项目依赖
        run: npm install

      - name: 🏗️ 生成 iOS 原生工程
        run: npx expo prebuild --platform ios --clean

      - name: 🍏 安装 CocoaPods 依赖
        run: |
          cd ios
          pod install

      - name: 🔨 编译无签名 iOS 核心程序
        run: |
          # 确保 Xcode 能够正确识别 Node 20 路径
          echo "export NODE_BINARY=$(which node)" > ios/.xcode.env.local
          
          cd ios
          WORKSPACE=$(ls | grep .xcworkspace | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          
          echo "==== 开始精准编译 (Node 20 环境) ===="
          
          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath $PWD/build/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            COMPILER_INDEX_STORE_ENABLE=NO
            
          mkdir -p Payload
          cp -r $PWD/build/App.xcarchive/Products/Applications/*.app Payload/
          zip -qr ../TrollStore_Tesla.ipa Payload

      - name: 📤 上传打包好的 IPA 文件
        uses: actions/upload-artifact@v4
        with:
          name: TrollStore_Tesla_App
          path: TrollStore_Tesla.ipa
          retention-days: 7